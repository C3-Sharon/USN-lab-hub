spring:
  datasource:
    url: jdbc:mysql://生产IP:3306/lab_management?useSSL=true&serverTimezone=Asia/Shanghai
    username: prod_user
    password: ${DB_PASSWORD}   # 从环境变量读取，不硬编码
  datasource:
    hikari:
      maximum-pool-size: 10   # 生产环境可调大连接池

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl   # 生产环境关闭控制台 SQL 日志